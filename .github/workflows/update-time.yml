name: Monitor Google
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Google + update site
        run: |
          TIME=$(date -u +"%Y-%m-%d %H:%M UTC")
          if curl -s --head --fail https://www.google.com > /dev/null; then
            STATUS="✅ All Systems Operational"
            COLOR="green"
          else
            STATUS="❌ Outage Detected"
            COLOR="red"
          fi
          sed -i "s|<h2.*</h2>|<h2 style=\"color:$COLOR;\">$STATUS</h2>|" index.html
          sed -i "s|<p>Last checked:.*</p>|<p>Last checked: $TIME</p>|" index.html
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Bot: Status check at $TIME"
          git push
